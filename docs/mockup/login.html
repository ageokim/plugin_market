<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Plugin Market — 로그인 전 (목업)</title>
<style>
  :root {
    --bg:#0a0c10; --panel:#12151c; --glass:rgba(18,21,28,.72);
    --line:#232833; --line2:#2e3442;
    --text:#e7eaf0; --muted:#8b93a3; --dim:#5c6474;
    --acc1:#6366f1; --acc2:#a855f7;
    --grad:linear-gradient(135deg,var(--acc1),var(--acc2));
    --green:#34d399;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:
           radial-gradient(900px 480px at 70% -10%, rgba(168,85,247,.16), transparent),
           radial-gradient(700px 420px at 0% 110%, rgba(99,102,241,.12), transparent),
           var(--bg);
         color:var(--text); overflow:hidden;
         font-family:-apple-system,"Segoe UI","Noto Sans KR",sans-serif; line-height:1.6; }
  .ic { width:16px; height:16px; stroke:currentColor; stroke-width:2;
        fill:none; stroke-linecap:round; stroke-linejoin:round; flex:none; }

  .mock-banner { background:rgba(251,191,36,.08); color:#d4a52a; text-align:center;
                 font-size:.74rem; padding:5px; border-bottom:1px solid rgba(251,191,36,.15); }

  header { display:flex; align-items:center; gap:10px; padding:12px 18px;
           background:var(--glass); backdrop-filter:blur(14px);
           border-bottom:1px solid var(--line); font-weight:800; letter-spacing:-.02em; }
  header .mark { width:28px; height:28px; border-radius:9px; background:var(--grad);
                 display:flex; align-items:center; justify-content:center;
                 box-shadow:0 4px 14px rgba(124,93,250,.4); }
  header .mark .ic { width:15px; height:15px; color:#fff; }

  /* 뒤에 깔린 잠긴 메인 (블러) */
  .locked-bg { filter:blur(6px) brightness(.45); pointer-events:none; user-select:none;
               display:flex; height:calc(100vh - 106px); }
  .locked-bg .side { width:250px; background:var(--panel); border-right:1px solid var(--line); padding:16px; }
  .locked-bg .main { flex:1; padding:16px; }
  .locked-bg .box  { background:var(--panel); border:1px solid var(--line);
                     border-radius:14px; padding:14px; margin-bottom:10px; color:var(--muted); }

  /* 로그인 카드 */
  .login-wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  .login-card { width:370px; background:var(--glass); backdrop-filter:blur(20px);
                border:1px solid var(--line2); border-radius:20px; padding:34px;
                box-shadow:0 24px 80px rgba(0,0,0,.6); }
  .login-card .mark { width:44px; height:44px; border-radius:14px; background:var(--grad);
                      display:flex; align-items:center; justify-content:center; margin:0 auto 14px;
                      box-shadow:0 8px 24px rgba(124,93,250,.45); }
  .login-card .mark .ic { width:22px; height:22px; color:#fff; }
  .login-card h2 { text-align:center; margin-bottom:2px; letter-spacing:-.02em; }
  .login-card .sub { text-align:center; color:var(--muted); font-size:.8rem; margin-bottom:24px; }

  .field { margin-bottom:14px; }
  .field label { display:block; font-size:.72rem; color:var(--muted); margin-bottom:5px;
                 letter-spacing:.03em; }
  .in { position:relative; }
  .in .ic { position:absolute; left:12px; top:11px; width:15px; height:15px; color:var(--dim); }
  .in input { width:100%; background:rgba(0,0,0,.35); border:1px solid var(--line2);
              border-radius:12px; padding:10px 12px 10px 36px; color:var(--text);
              font-size:.88rem; outline:none; transition:border-color .15s; }
  .in input:focus { border-color:var(--acc1); }
  .field .hint { font-size:.7rem; color:var(--dim); margin-top:4px; }

  .btn-login { display:flex; align-items:center; justify-content:center; gap:8px;
               width:100%; background:var(--grad); color:#fff; padding:12px;
               border-radius:12px; font-weight:700; text-decoration:none; margin-top:8px;
               box-shadow:0 6px 20px rgba(124,93,250,.4); transition:transform .12s; }
  .btn-login:hover { transform:translateY(-1px); }
  .note { text-align:center; color:var(--dim); font-size:.72rem; margin-top:16px; line-height:1.6; }
  .note b { color:var(--green); font-weight:600; }
</style>
</head>
<body>

<svg style="display:none" xmlns="http://www.w3.org/2000/svg">
  <symbol id="i-box" viewBox="0 0 24 24"><path d="M21 8a2 2 0 0 0-1-1.7l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.7l7 4a2 2 0 0 0 2 0l7-4a2 2 0 0 0 1-1.7Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></symbol>
  <symbol id="i-user" viewBox="0 0 24 24"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></symbol>
  <symbol id="i-lock" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></symbol>
  <symbol id="i-in" viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></symbol>
</svg>

<div class="mock-banner">목업 — 화면 모습 확인용 · 로그인 버튼 → "로그인 후" 화면으로 이동</div>

<header><span class="mark"><svg class="ic"><use href="#i-box"/></svg></span>Plugin Market</header>

<!-- 로그인 전이라 뒤 화면(사이드바+메인)은 잠겨서 흐릿하게만 보임 -->
<div class="locked-bg">
  <div class="side">
    <div class="box">ORGANIZATION 추가 …</div>
    <div class="box">plugin-a ● 사용중</div>
  </div>
  <div class="main">
    <div class="box" style="height:80%">Claude · 터미널 …</div>
  </div>
</div>

<div class="login-wrap">
  <div class="login-card">
    <div class="mark"><svg class="ic"><use href="#i-box"/></svg></div>
    <h2>Plugin Market</h2>
    <div class="sub">GitHub 계정으로 로그인</div>

    <div class="field">
      <label>ID</label>
      <div class="in">
        <svg class="ic"><use href="#i-user"/></svg>
        <input value="ageokim">
      </div>
    </div>
    <div class="field">
      <label>PWD — Personal Access Token</label>
      <div class="in">
        <svg class="ic"><use href="#i-lock"/></svg>
        <input type="password" value="ghp_xxxxxxxxxxxx">
      </div>
      <div class="hint">GitHub 비밀번호가 아닌 PAT (repo + read:org)</div>
    </div>

    <a class="btn-login" href="main.html"><svg class="ic"><use href="#i-in"/></svg>로그인</a>

    <div class="note">
      로그인하면 <b>자동 저장</b>되어 다음부터 이 창 없이 바로 시작됩니다<br>
      organization 주소는 로그인 후 <b>사이드바에서</b> 추가합니다
    </div>
  </div>
</div>

</body>
</html>
